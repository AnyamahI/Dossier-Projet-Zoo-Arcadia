<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expandable Image with Animation</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-color: #f0f0f0;
      }

      .container {
        width: 300px;
        overflow: hidden;
        text-align: center;
        cursor: pointer;
        transition: height 0.5s ease;
      }

      .image-container {
        position: relative;
        overflow: hidden;
        height: 200px;
        transition: height 0.5s ease;
      }

      .image-container img {
        width: 100%;
        height: auto;
      }

      .image-container h2 {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        font-size: 24px;
        text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.7);
        pointer-events: none;
      }

      .hidden-content {
        display: none;
        margin-top: 10px;
      }

      .hidden-content p {
        font-size: 16px;
        color: #333;
      }

      .hidden-content .extra-images {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-top: 10px;
      }

      .hidden-content .extra-images img {
        width: 80px;
        height: 80px;
        border-radius: 8px;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        cursor: pointer;
      }

      .hidden-content .extra-images img:hover {
        transform: scale(1.1);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      }
    </style>
  </head>
  <body>
    <div class="container" onclick="expandImage()">
      <div class="image-container">
        <img src="/média/média/Savane.jpg" alt="Expandable Image" />
        <h2>Savane</h2>
      </div>
      <div class="hidden-content" id="hiddenContent">
        <p>
          Voici le texte qui apparaît sous le titre après avoir cliqué sur
          l'image.
        </p>
        <div class="extra-images">
          <a href="/page1.html">
            <img src="/média/média animaux/blop_elephant.png" alt="Image 1" />
          </a>
          <a href="/page2.html">
            <img src="/média/média animaux/blop_zebre.png" alt="Image 2" />
          </a>
          <a href="/page3.html">
            <img src="/média/média animaux/blop_lion.png" alt="Image 3" />
          </a>
        </div>
      </div>
    </div>

    <script>
      function expandImage() {
        const container = document.querySelector(".container");
        const hiddenContent = document.getElementById("hiddenContent");

        if (container.style.height === "auto") {
          container.style.height = "200px";
          hiddenContent.style.display = "none";
        } else {
          container.style.height = "auto";
          hiddenContent.style.display = "block";
        }
      }
    </script>
  </body>
</html>
